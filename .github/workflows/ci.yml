name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # 週次（毎週月曜 7:00 JST = 日曜 22:00 UTC）。誰も push しなくても
    # macOS ランナーイメージや Swift ツールチェインの更新でビルドが壊れて
    # いないかを定期的に検知するための実行。
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  build:
    # macos-latest を使う（固定ラベルは存在しないラベルを指すと startup_failure
    # で落ちるため）。イメージ更新によるツールチェインのドリフトは、週次実行と
    # 下の swift --version ログで検知する。
    runs-on: macos-latest
    steps:
      # タグではなくコミット SHA で固定する。タグは上流で付け替えられるため、
      # action が乗っ取られた際にそのまま任意コードを引き込んでしまう。
      # 更新は Dependabot (.github/dependabot.yml) が SHA ごと追従する。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select newest Xcode
        # ビルドには Swift 6.2 以降が必要。イメージのデフォルト Xcode が古い
        # 場合に備え、インストールされている中で最新の Xcode を明示的に選ぶ。
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting: $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Show Swift toolchain version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Assemble app bundle
        run: make app
